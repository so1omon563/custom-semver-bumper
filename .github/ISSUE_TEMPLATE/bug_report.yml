name: Bug Report
description: Report a bug or unexpected behaviour in the Custom Version Bumper action.
# NOTE: The URLs below are absolute. Update them if this repository is renamed or transferred.
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as
        possible to help us reproduce and fix the issue.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched [existing issues](https://github.com/so1omon563/custom-semver-bumper/issues) and this has not been reported before.
          required: true
        - label: I am using a [supported version](https://github.com/so1omon563/custom-semver-bumper/releases) of the action.
          required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: "Example: When #skip is in the PR body but not the title, the version is still bumped."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: >
        Step-by-step instructions to reproduce the behaviour. Include your workflow
        configuration and a sample commit message if relevant.
      placeholder: |
        1. Configure the action with `default_bump: minor`
        2. Merge a PR with commit message "chore: update deps #skip"
        3. Observe that a tag is still created
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or unexpected output.
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Workflow configuration
      description: >
        Paste the relevant portion of your workflow YAML. Remove any sensitive values.
      render: yaml
    validations:
      required: false

  - type: input
    id: action-version
    attributes:
      label: Action version
      description: Which version (tag or SHA) of the action are you using?
      placeholder: "e.g. v2.1.0 or @main"
    validations:
      required: true

  - type: input
    id: runner
    attributes:
      label: Runner OS
      description: What GitHub Actions runner OS are you using?
      placeholder: "e.g. ubuntu-latest"
    validations:
      required: false
